name: CMake
on:
  push:
    paths:
      - '**/*.cmake'
      - '**/*.cmake.in'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake.yml'
      - 'Brewfile'
      - 'ci/**'
      - 'cmake/**'
      - 'compose.yaml'
      - 'dockerfiles/*'
      - 'include/**/*.h'
      - 'include/**/*.h.in'
      - 'include/**/*.hpp'
      - 'lib/**/*.c'
      - 'lib/**/*.cpp'
      - 'lib/**/*.h'
      - 'lib/**/*.hpp'
      - 'lib/**/*.rb'
      - 'plugins/**/*.c'
      - 'plugins/**/*.cpp'
      - 'plugins/**/*.h'
      - 'plugins/**/*.rb'
      - 'setup.sh'
      - 'src/**/*.c'
      - 'src/**/*.h'
      - 'test/command/**'
      - 'test/command_line/**'
      - 'test/mruby/**'
      - 'vendor/mruby/**'
  pull_request:
    paths:
      - '**/*.cmake'
      - '**/*.cmake.in'
      - '**/CMakeLists.txt'
      - '.github/workflows/cmake.yml'
      - 'Brewfile'
      - 'ci/**'
      - 'cmake/**'
      - 'compose.yaml'
      - 'dockerfiles/*'
      - 'include/**/*.h'
      - 'include/**/*.h.in'
      - 'include/**/*.hpp'
      - 'lib/**/*.c'
      - 'lib/**/*.cpp'
      - 'lib/**/*.h'
      - 'lib/**/*.hpp'
      - 'lib/**/*.rb'
      - 'plugins/**/*.c'
      - 'plugins/**/*.cpp'
      - 'plugins/**/*.h'
      - 'plugins/**/*.rb'
      - 'setup.sh'
      - 'src/**/*.c'
      - 'src/**/*.h'
      - 'test/command/**'
      - 'test/command_line/**'
      - 'test/mruby/**'
      - 'vendor/mruby/**'
  schedule:
    - cron: |
        0 21 * * *
concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  windows-msys2:
    name: Windows MSYS2
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - msystem: MINGW64
            package-prefix: mingw-w64-x86_64
            runner: windows-latest
          - msystem: UCRT64
            package-prefix: mingw-w64-ucrt-x86_64
            runner: windows-latest
          - msystem: CLANGARM64
            package-prefix: mingw-w64-clang-aarch64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/checkout@v6
        with:
          repository: msys2/MINGW-packages
          path: ci/msys2/MINGW-packages
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.package-prefix }}-ccache
            ${{ matrix.package-prefix }}-toolchain
            ${{ matrix.package-prefix }}-ruby
            ${{ matrix.package-prefix }}-xsimd
            base-devel
            binutils
            git
            msys2-devel
            pactoys
            ${{ matrix.package-prefix }}-gobject-introspection
            ${{ matrix.package-prefix }}-glib2
            ${{ matrix.package-prefix }}-pkgconf
      - name: Prepare
        shell: msys2 {0}
        run: |
          set -ex
          cd ci/msys2
          sed -i'' -e 's/^CheckSpace/#CheckSpace/g' /etc/pacman.conf
          MINGW-packages/.ci/fetch-validpgpkeys.sh
      - name: Prepare ccache
        shell: msys2 {0}
        run: |
          echo "CCACHE_DIR=${PWD}/ccache" >> ${GITHUB_ENV}
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: cmake-windows-msys2-${{ matrix.msystem }}-ccache-${{ hashFiles('lib/**', 'src/**', 'plugins/**', 'include/**') }}
          restore-keys: cmake-windows-msys2-${{ matrix.msystem }}-ccache-
      - name: Build
        shell: msys2 {0}
        run: |
          set -ex
          version=$(cat base_version)
          rake dist
          mv groonga-${version}.tar.gz ci/msys2/
          cd ci/msys2
          sed -i'' -e "s/^pkgver=/pkgver=${version}/" PKGBUILD
          MINGW_ARCH=${{ matrix.msystem }} \
            makepkg-mingw \
              --cleanbuild \
              --nocheck \
              --noconfirm \
              --noprogressbar \
              --rmdeps \
              --syncdeps
          ccache --show-stats --verbose --version || :
      - name: Install
        shell: msys2 {0}
        run: |
          set -ex
          cd ci/msys2
          pacman \
            --noconfirm \
            --noprogressbar \
            --upgrade \
            *.pkg.tar.*
          cp -a *.pkg.tar.* ../../

      # Artifact
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.msystem }}
          path: "*.pkg.tar.*"

      # Test
      - name: Use JST
        run: |
          Set-TimeZone -Id "Tokyo Standard Time"
      - name: Install test dependencies
        shell: msys2 {0}
        run: |
          gem install rubygems-requirements-system
          # "fiddle" is for ensuring using the installed system libffi
          MAKEFLAGS="-j$(nproc) V=1" gem install \
            fiddle \
            grntest \
            pkg-config \
            red-arrow || :
          echo "=== Debug: .pc files ==="
          echo "--- arrow.pc ---"
          ARROW_PC_DIR=$(pkg-config --variable=pcfiledir arrow)
          echo "pcfiledir: ${ARROW_PC_DIR}"
          cat "${ARROW_PC_DIR}/arrow.pc"
          echo "--- arrow-glib.pc ---"
          ARROW_GLIB_PC_DIR=$(pkg-config --variable=pcfiledir arrow-glib)
          echo "pcfiledir: ${ARROW_GLIB_PC_DIR}"
          cat "${ARROW_GLIB_PC_DIR}/arrow-glib.pc"
          echo "=== Debug: arrow Requires.private .pc files ==="
          for pkg in snappy libbrotlidec libbrotlienc zlib liblz4 libzstd re2 bzip2 libutf8proc; do
            echo "--- ${pkg}.pc ---"
            PC_DIR=$(pkg-config --variable=pcfiledir ${pkg} 2>/dev/null)
            if [ -n "${PC_DIR}" ]; then
              cat "${PC_DIR}/${pkg}.pc"
            else
              echo "not found"
            fi
          done
          echo "=== Debug: pkg-config --cflags for each dependency ==="
          for pkg in snappy libbrotlidec libbrotlienc zlib liblz4 libzstd re2 bzip2 libutf8proc; do
            echo "--- ${pkg} ---"
            pkg-config --cflags ${pkg} 2>/dev/null || echo "not found"
          done
          echo "=== Debug: re2 Requires (absl) .pc files ==="
          for pkg in absl_absl_check absl_absl_log absl_base absl_core_headers absl_fixed_array absl_flags absl_flat_hash_map absl_flat_hash_set absl_hash absl_inlined_vector absl_optional absl_span absl_str_format absl_strings absl_synchronization; do
            echo "--- ${pkg}.pc ---"
            PC_DIR=$(pkg-config --variable=pcfiledir ${pkg} 2>/dev/null)
            if [ -n "${PC_DIR}" ]; then
              cat "${PC_DIR}/${pkg}.pc"
            else
              echo "not found"
            fi
          done
          echo "=== Debug: arrow requires ==="
          pkg-config --print-requires arrow || echo "(none)"
          echo "=== Debug: arrow requires-private ==="
          pkg-config --print-requires-private arrow || echo "(none)"
          echo "=== Debug: pkgconf --debug --cflags arrow (first 500 lines) ==="
          pkgconf --debug --cflags arrow 2>&1 | head -500
          echo "=== Debug: end ==="
          ruby -e "require 'arrow'"
      - name: Prepare setup-extpp.rb
        shell: msys2 {0}
        run: |
          cat <<RUBY > setup-extpp.rb
          ["extpp"].each do |gem|
            spec = Gem::Specification.find_by_name(gem)
            ENV["PATH"] = [
              File.join(spec.full_gem_path, "lib"),
              ENV["PATH"],
            ].join(File::PATH_SEPARATOR)
          end
          RUBY
      - name: "Test: command line"
        shell: msys2 {0}
        run: |
          ruby test/command_line/run-test.rb
      - name: "Test: stdio"
        shell: msys2 {0}
        run: |
          ruby \
            -r./setup-extpp \
            -S \
              grntest \
                --base-directory=test/command \
                --n-retries=2 \
                --read-timeout=30 \
                --reporter=mark \
                --timeout=60 \
                test/command/suite
